- id: '1779633653938'
  alias: Item counter (auto)
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.device_pir_motion_sensor_01_motion_sensor
    from:
    - 'off'
    to:
    - 'on'
  conditions: []
  actions:
  - action: counter.increment
    metadata: {}
    target:
      entity_id: counter.item_counter
    data: {}
  mode: single
- id: '1779635066696'
  alias: Wastebin capacity is 50%
  description: ''
  triggers:
  - trigger: numeric_state
    entity_id:
    - counter.item_counter
    above: 50
  conditions: []
  actions:
  - action: notify.persistent_notification
    metadata: {}
    data:
      message: Wastebin capacity is 50%
      title: Capacity warning 50%
  mode: single
- id: '1779635319852'
  alias: Daily count reset
  description: ''
  triggers:
  - trigger: time
    at: '23:59:59'
  conditions: []
  actions:
  - action: counter.reset
    metadata: {}
    target:
      entity_id: counter.item_counter
    data: {}
  mode: single
